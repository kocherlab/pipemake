name: Conda Upload

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v2
      - uses: conda-incubator/setup-miniconda@v4
        with:
          auto-activate: true
          activate-environment: ""
          channels: conda-forge,bioconda,conda-forge/label/python_rc

      - name: Setup Windows packages
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          conda install -y conda-build anaconda::anaconda-client
      - name: Build Windows packages
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          conda build .conda/pipemake-minimal --output-folder build
          conda build .conda/pipemake --output-folder build
      - name: Upload Windows
        if: matrix.os == 'windows-latest'
        shell: powershell
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          anaconda -t "$env:ANACONDA_API_TOKEN" upload --user kocherlab build/win-64/*.conda

      - name: Setup (${{ matrix.os }}) packages
        shell: bash -el {0}
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        run: |
          conda install -y conda-build anaconda::anaconda-client

      - name: Build MacOS packages
        if: matrix.os == 'macos-latest'
        shell: bash -el {0}
        run: |
          conda build .conda/pipemake-minimal --output-folder build
          conda build .conda/pipemake --output-folder build
      - name: Upload MacOS
        if: matrix.os == 'macos-latest'
        shell: bash -el {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          anaconda -t "$ANACONDA_API_TOKEN" upload --user kocherlab build/osx-arm64/*.conda

      - name: Build Ubuntu packages
        if: matrix.os == 'ubuntu-latest'
        shell: bash -el {0}
        run: |
          conda build .conda/pipemake-minimal --output-folder build
          conda build .conda/pipemake --output-folder build
          conda build .conda/pipemake-internal-argo --output-folder build
          conda build .conda/pipemake-internal-della --output-folder build
      - name: Upload Ubuntu
        if: matrix.os == 'ubuntu-latest'
        shell: bash -el {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          anaconda -t "$ANACONDA_API_TOKEN" upload --user kocherlab build/linux-64/*.conda
        
