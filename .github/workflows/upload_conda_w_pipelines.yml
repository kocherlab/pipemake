name: Conda w/ Pipelines Upload

on:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v4
        with:
          auto-activate: true
          activate-environment: ""
          channels: conda-forge,bioconda,conda-forge/label/python_rc

      - name: Setup Windows package
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          conda install -y conda-build anaconda::anaconda-client
      - name: Build Windows package
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          conda build .conda/pipemake --output-folder build
      - name: Upload Windows package
        if: matrix.os == 'windows-latest'
        shell: powershell
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          anaconda -t "$env:ANACONDA_API_TOKEN" upload --force --user kocherlab build/win-64/*.conda
      
      - name: Setup (${{ matrix.os }}) package
        shell: bash -el {0}
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        run: |
          conda install -y conda-build anaconda::anaconda-client
      - name: Build (${{ matrix.os }}) package
        shell: bash -el {0}
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        run: |
          conda build .conda/pipemake --output-folder build
      - name: Upload MacOS package
        if: matrix.os == 'macos-latest'
        shell: bash -el {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          anaconda -t "$ANACONDA_API_TOKEN" upload --force --user kocherlab build/osx-arm64/*.conda
      - name: Upload Ubuntu package
        if: matrix.os == 'ubuntu-latest'
        shell: bash -el {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          anaconda -t "$ANACONDA_API_TOKEN" upload --force --user kocherlab build/linux-64/*.conda
        
